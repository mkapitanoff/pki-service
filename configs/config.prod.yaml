app:
  env: prod
  port: 8080
  verify_base_url: "http://localhost:8080"
  jwt_secret: "CHANGE_ME_USE_STRONG_SECRET_32CHARS"

database:
  dsn: "postgres://user:pass@postgres:5432/eds_prod?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime_sec: 300

ncanode:
  url: "http://ncanode:14579"
  timeout_sec: 30

storage:
  endpoint: "http://minio:9000"
  region: "us-east-1"
  bucket: "eds-prod"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  use_path_style: true    # true для MinIO, false для AWS S3

redis:
  addr: "redis:6379"
  password: ""
  db: 0

rabbitmq:
  url: "amqp://guest:guest@rabbitmq:5672/"
  webhook_queue: "webhook.delivery"
  event_exchange: "eds.events"
  prefetch_count: 5

log:
  level: "info"
  format: "json"

rate_limit:
  verify_per_minute: 60
  api_per_minute: 300
