services:

  postgres:
    image: postgres:15-alpine
    container_name: pki_pg_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eds_prod}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-eds_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pki_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: always

  rabbitmq:
    image: rabbitmq:3.12-alpine
    container_name: pki_rmq_prod
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
    volumes:
      - rmq_prod_data:/var/lib/rabbitmq
    restart: always

  minio:
    image: minio/minio:latest
    container_name: pki_minio_prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_prod_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: pki_minio_init_prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/eds-prod;
        mc anonymous set none local/eds-prod;
        echo 'MinIO bucket eds-prod ready';
      "
    restart: "no"

  ncanode:
    image: malikzh/ncanode:latest
    container_name: pki_ncanode_prod
    environment:
      NCANODE_DEBUG: "false"
      NCANODE_OCSP_URL: "http://ocsp.pki.gov.kz/"
      NCANODE_TSP_URL: "http://tsp.pki.gov.kz/"
      NCANODE_CRL_URL: >
        http://crl.pki.gov.kz/nca_rsa.crl
        http://crl.pki.gov.kz/nca_gost.crl
        http://crl.pki.gov.kz/nca_gost2022.crl
      NCANODE_CA_URL: >
        http://pki.gov.kz/cert/root_gost.cer
        http://pki.gov.kz/cert/root_rsa.cer
        http://pki.gov.kz/cert/root_gost_2022.cer
        http://pki.gov.kz/cert/nca_gost.cer
        http://pki.gov.kz/cert/nca_rsa.cer
        http://pki.gov.kz/cert/nca_gost2022.cer
    ports:
      - "127.0.0.1:14579:14579"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:14579/"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pki_api_prod
    environment:
      APP_ENV: prod
    env_file:
      - ../.env.prod
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ncanode:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    restart: always

volumes:
  pg_prod_data:
  redis_prod_data:
  rmq_prod_data:
  minio_prod_data:
